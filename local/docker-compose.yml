services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: cms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: ../
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URI: postgresql://payload:payload@postgres:5432/cms
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-secret-change-in-production-min32chars!!}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
